name: Update CIDR lists

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "config/**"
      - "domains/**"
      - "patches/**"
      - "src/**"
      - "scripts/**"
      - ".github/workflows/update.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build lists
        run: PYTHONPATH=src python3 scripts/build.py

      - name: Commit updated lists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lists meta
          if git diff --staged --quiet; then
            echo "No list changes"
            exit 0
          fi
          git commit -m "chore: refresh AI CIDR lists"
          git push
